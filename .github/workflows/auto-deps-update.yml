name: Auto Dependency Update

on:
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Update dependencies
        run: |
          pnpm install
          pnpm update
          pnpm dedupe
          pnpm ultracite:fix

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(deps): auto update dependencies"
          title: "chore(deps): auto update dependencies"
          body: |
            Automated dependency update by GitHub Actions.

            - All dependencies updated to latest
            - Checks passed: pnpm check:turbo
          branch: chore/auto-deps-update
          delete-branch: true
          labels: dependencies
